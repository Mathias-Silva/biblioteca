docker.host=npipe:////./pipe/docker_engine
# Define que o Testcontainers deve se conectar ao Docker via Named Pipe (Windows).
# Esse caminho é específico do Windows para acessar o Docker Engine.

docker.client.strategy=org.testcontainers.dockerclient.NpipeSocketClientProviderStrategy
# Estratégia de cliente: força o Testcontainers a usar o Named Pipe como forma de comunicação.
# Necessário em ambientes Windows quando não há socket Unix disponível.
