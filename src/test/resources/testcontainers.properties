# Testcontainers configuration (removed from repo)
# Removed because it forced Windows Named Pipe (npipe) and broke CI on Linux runners.
# If you need local Windows configuration, add the following to your local ~/.testcontainers.properties
# (do NOT commit it to the repository):
# docker.host=npipe:////./pipe/docker_engine
# docker.client.strategy=org.testcontainers.dockerclient.NpipeSocketClientProviderStrategy
