logging.level.org.testcontainers=DEBUG 
# Ativa logs detalhados do Testcontainers (útil para debugar containers do Docker durante os testes)

api.google-books.url=http://localhost:8081 
# Define a URL da API do Google Books como o WireMock (VCR) rodando na porta 8081
# Assim, durante os testes, em vez de chamar a API real, o sistema usa o servidor fake do WireMock