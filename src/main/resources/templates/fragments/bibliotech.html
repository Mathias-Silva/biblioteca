<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">BiblioTech</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/bibliotech.css}">
</head>

<nav th:fragment="navbar" class="bt-navbar">
    <a class="bt-navbar__brand" th:href="@{/livros}">
        <svg width="24" height="24" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect width="26" height="26" rx="7" fill="#6366F1"/>
            <path d="M7 7h5a4 4 0 0 1 4 4v8H7V7Z" fill="white" opacity="0.9"/>
            <path d="M16 11h2a3 3 0 0 1 3 3v5h-5v-8Z" fill="white" opacity="0.55"/>
        </svg>
        <span>BiblioTech</span>
    </a>
    <div class="bt-navbar__actions">
        <span class="bt-navbar__user">
            <i class="ti ti-user" aria-hidden="true"></i>
            <span>Área do Usuário</span>
        </span>
        <form th:action="@{/logout}" method="post" class="m-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="bt-btn-logout">
                <i class="ti ti-logout" aria-hidden="true"></i>
                Sair
            </button>
        </form>
    </div>
</nav>
</html>
