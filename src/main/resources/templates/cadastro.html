<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/bibliotech :: head('Cadastro | BiblioTech')}"></head>
<body>

<div class="bt-auth-page">
    <div class="bt-card bt-card--wide">
        <h1 class="bt-card__title">Criar Conta</h1>

        <section th:if="${param.erro != null and param.erro[0] == 'email'}" class="bt-alert bt-alert--danger" role="alert">
            Este e-mail já está cadastrado. Use outro e-mail ou faça login.
        </section>
        <div id="cep-alerta" class="bt-alert d-none" role="alert"></div>

        <form th:action="@{/usuarios/cadastro}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <h2 class="bt-section-heading">Dados pessoais</h2>
            <div class="bt-field">
                <label class="bt-label" for="nome">Nome</label>
                <input type="text" id="nome" name="nome" class="bt-input" required>
            </div>
            <div class="bt-field">
                <label class="bt-label" for="email">Email</label>
                <input type="email" id="email" name="email" class="bt-input" required>
            </div>
            <div class="bt-field">
                <label class="bt-label" for="senha">Senha</label>
                <input type="password" id="senha" name="senha" class="bt-input" required>
            </div>

            <h2 class="bt-section-heading">Endereço</h2>
            <div class="bt-field">
                <label class="bt-label" for="cep">CEP</label>
                <div class="bt-input-group">
                    <input type="text" name="cep" id="cep" class="bt-input" placeholder="00000-000" maxlength="9" required>
                    <button type="button" id="btn-buscar-cep" class="bt-btn-ghost">
                        <i class="ti ti-search" aria-hidden="true"></i> Buscar
                    </button>
                </div>
            </div>
            <div class="bt-field">
                <label class="bt-label" for="logradouro">Logradouro</label>
                <input type="text" name="logradouro" id="logradouro" class="bt-input" required>
            </div>
            <div class="bt-form-row bt-form-row--3-2">
                <div class="bt-field">
                    <label class="bt-label" for="numero">Número</label>
                    <input type="text" name="numero" id="numero" class="bt-input" required>
                </div>
                <div class="bt-field">
                    <label class="bt-label" for="complemento">Complemento</label>
                    <input type="text" name="complemento" id="complemento" class="bt-input">
                </div>
            </div>
            <section class="bt-field">
                <label class="bt-label" for="bairro">Bairro</label>
                <input type="text" name="bairro" id="bairro" class="bt-input" required>
            </section>
            <div class="bt-form-row">
                <div class="bt-field">
                    <label class="bt-label" for="cidade">Cidade</label>
                    <input type="text" name="cidade" id="cidade" class="bt-input" required>
                </div>
                <div class="bt-field">
                    <label class="bt-label" for="estado">UF</label>
                    <input type="text" name="estado" id="estado" class="bt-input" maxlength="2" required>
                </div>
            </div>

            <button type="submit" class="bt-btn-success bt-w-100">Cadastrar</button>
        </form>
        <p class="bt-text-center bt-mt-3">
            <a th:href="@{/login}">Já tem conta? Faça login</a>
        </p>
    </div>
</div>

<script>
    const btnBuscarCep = document.getElementById('btn-buscar-cep');
    const alertaCep = document.getElementById('cep-alerta');

    function mostrarAlertaCep(mensagem, tipo) {
        alertaCep.textContent = mensagem;
        alertaCep.className = 'bt-alert bt-alert--' + tipo;
        alertaCep.classList.remove('d-none');
    }

    async function buscarCep() {
        const cep = document.getElementById('cep').value.trim();
        if (!cep) {
            mostrarAlertaCep('Informe o CEP antes de buscar.', 'warning');
            return;
        }

        btnBuscarCep.disabled = true;
        alertaCep.classList.add('d-none');

        try {
            const resposta = await fetch('/usuarios/buscar-cep?cep=' + encodeURIComponent(cep));
            if (!resposta.ok) {
                mostrarAlertaCep('CEP não encontrado.', 'warning');
                return;
            }

            const dados = await resposta.json();
            document.getElementById('cep').value = dados.cep || cep;
            document.getElementById('logradouro').value = dados.logradouro || '';
            document.getElementById('complemento').value = dados.complemento || '';
            document.getElementById('bairro').value = dados.bairro || '';
            document.getElementById('cidade').value = dados.cidade || '';
            document.getElementById('estado').value = dados.estado || '';
            document.getElementById('numero').focus();
            mostrarAlertaCep('Endereço preenchido. Informe o número.', 'success');
        } catch (e) {
            mostrarAlertaCep('Erro ao consultar o CEP. Tente novamente.', 'danger');
        } finally {
            btnBuscarCep.disabled = false;
        }
    }

    btnBuscarCep.addEventListener('click', buscarCep);
</script>
</body>
</html>
