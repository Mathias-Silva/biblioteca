<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/bibliotech :: head('Cadastrar Livro | BiblioTech')}"></head>
<body>

<nav th:replace="~{fragments/bibliotech :: navbar}"></nav>

<main class="bt-container">
    <div class="bt-card bt-card--form">
        <h1 class="bt-card__title">Novo Livro</h1>
        <div id="isbn-alerta" class="bt-alert d-none" role="alert"></div>

        <form th:action="@{/livros/salvar}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="bt-field">
                <label class="bt-label" for="isbn">ISBN</label>
                <div class="bt-input-group">
                    <input type="text" name="isbn" id="isbn" class="bt-input" required>
                    <button type="button" id="btn-buscar-isbn" class="bt-btn-ghost">
                        <i class="ti ti-search" aria-hidden="true"></i> Buscar
                    </button>
                </div>
                <span class="bt-hint">Digite o ISBN e clique em Buscar para preencher título, autor e gênero.</span>
            </div>
            <div class="bt-field">
                <label class="bt-label" for="titulo">Título</label>
                <input type="text" name="titulo" id="titulo" class="bt-input" required>
            </div>
            <div class="bt-field">
                <label class="bt-label" for="autor">Autor</label>
                <input type="text" name="autor" id="autor" class="bt-input" required>
            </div>
            <div class="bt-field">
                <label class="bt-label" for="genero">Gênero</label>
                <input type="text" name="genero" id="genero" class="bt-input">
            </div>
            <div class="bt-form-actions">
                <button type="submit" class="bt-btn-success">Salvar Livro</button>
                <a th:href="@{/livros}" class="bt-btn-ghost">Cancelar</a>
            </div>
        </form>
    </div>
</main>

<script>
    const btnBuscarIsbn = document.getElementById('btn-buscar-isbn');
    const alertaIsbn = document.getElementById('isbn-alerta');

    function mostrarAlertaIsbn(mensagem, tipo) {
        alertaIsbn.textContent = mensagem;
        alertaIsbn.className = 'bt-alert bt-alert--' + tipo;
        alertaIsbn.classList.remove('d-none');
    }

    btnBuscarIsbn.addEventListener('click', async () => {
        const isbn = document.getElementById('isbn').value.trim();
        if (!isbn) {
            mostrarAlertaIsbn('Informe o ISBN antes de buscar.', 'warning');
            return;
        }

        btnBuscarIsbn.disabled = true;
        alertaIsbn.classList.add('d-none');

        try {
            const resposta = await fetch('/livros/buscar-isbn?isbn=' + encodeURIComponent(isbn));
            if (!resposta.ok) {
                mostrarAlertaIsbn('Erro no servidor ao buscar o ISBN (código ' + resposta.status + ').', 'danger');
                return;
            }

            const dados = await resposta.json();

            if (dados.mensagem) {
                mostrarAlertaIsbn(dados.mensagem, 'danger');
            } else if (dados.encontrado) {
                document.getElementById('titulo').value = dados.titulo || '';
                document.getElementById('autor').value = dados.autor || '';
                document.getElementById('genero').value = dados.genero || '';
                mostrarAlertaIsbn('Dados do livro preenchidos com sucesso.', 'success');
            } else {
                mostrarAlertaIsbn('Nenhum livro encontrado para este ISBN.', 'warning');
            }
        } catch (e) {
            mostrarAlertaIsbn('Erro ao consultar a API. Tente novamente.', 'danger');
        } finally {
            btnBuscarIsbn.disabled = false;
        }
    });
</script>
</body>
</html>
