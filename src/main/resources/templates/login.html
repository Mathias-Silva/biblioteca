<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/bibliotech :: head('Login | BiblioTech')}"></head>
<body>

<div class="bt-auth-page">
    <div class="bt-card bt-card--narrow">
        <h1 class="bt-card__title">Acessar Biblioteca</h1>

        <section th:if="${param.error}" class="bt-alert bt-alert--danger" role="alert">
            Email ou senha inválidos.
        </section>
        <div th:if="${param.logout}" id="logout-alert" class="bt-alert bt-alert--info bt-alert--timed" role="alert">
            <div class="bt-alert__content">
                <i class="ti ti-info-circle" aria-hidden="true"></i>
                <span>Você saiu da sessão.</span>
            </div>
            <div class="bt-alert__progress" aria-hidden="true">
                <span id="logout-alert-progress" class="bt-alert__progress-bar"></span>
            </div>
        </div>
        <div th:if="${param.sucesso}" class="bt-alert bt-alert--success" role="alert">
            Conta criada! Faça login.
        </div>

        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="bt-field">
                <label class="bt-label" for="username">Email</label>
                <input type="text" id="username" name="username" class="bt-input" required>
            </div>
            <div class="bt-field">
                <label class="bt-label" for="password">Senha</label>
                <input type="password" id="password" name="password" class="bt-input" required>
            </div>
            <button type="submit" class="bt-btn-primary bt-w-100">Entrar</button>
        </form>
        <p class="bt-text-center bt-mt-3">
            Novo aqui? <a th:href="@{/usuarios/cadastro}">Cadastre-se</a>
        </p>
    </div>
</div>

<script th:if="${param.logout}">
    (function () {
        const DURATION_MS = 7000;
        const alertEl = document.getElementById('logout-alert');
        const progressBar = document.getElementById('logout-alert-progress');
        if (!alertEl || !progressBar) {
            return;
        }

        progressBar.classList.add('is-running');

        window.setTimeout(function () {
            alertEl.classList.add('is-hiding');
            window.setTimeout(function () {
                alertEl.classList.add('d-none');
            }, 350);
        }, DURATION_MS);
    })();
</script>
</body>
</html>
