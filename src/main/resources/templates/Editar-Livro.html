<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Editar Livro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .navbar { box-shadow: 0 2px 4px rgba(0,0,0,.08); }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,.04); }
        .btn-primary { background-color: #2563eb; border: none; padding: 8px 20px; border-radius: 8px; }
        .btn-primary:hover { background-color: #1d4ed8; }
        .table thead th { background-color: #f1f5f9; color: #475569; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; }
    </style>
</head>
<body class="container mt-5">

<div class="card mx-auto" style="max-width: 600px;">
    <div class="card-body">
        <h2>Editar Livro</h2>
        <form th:action="@{/livros/editar/{id}(id=${livro.id})}" method="post">
            <div class="mb-3">
                <label>Título:</label>
                <input type="text" name="titulo" th:value="${livro.titulo}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Autor:</label>
                <input type="text" name="autor" th:value="${livro.autor}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>ISBN:</label>
                <input type="text" name="isbn" th:value="${livro.isbn}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Gênero:</label>
                <input type="text" name="genero" th:value="${livro.genero}" class="form-control">
            </div>
            <button type="submit" class="btn btn-warning">Salvar Alterações</button>
            <a href="/livros" class="btn btn-link">Cancelar</a>
        </form>
    </div>
</div>
</body>
</html>
