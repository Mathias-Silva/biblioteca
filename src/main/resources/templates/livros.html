<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Meus Livros | BiblioTech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; margin: 0; padding: 0; }
        .navbar { box-shadow: 0 2px 10px rgba(0,0,0,.1); padding: 0.8rem 0; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 12px rgba(0,0,0,.05); background: white; }
        .btn-primary { background-color: #2563eb; border: none; padding: 10px 24px; border-radius: 8px; font-weight: 600; transition: all 0.2s; }
        .btn-primary:hover { background-color: #1d4ed8; transform: translateY(-1px); }
        .table thead th { background-color: #f1f5f9; color: #475569; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; padding: 15px; }
        .table tbody td { padding: 15px; }
        .badge-isbn { background-color: #e2e8f0; color: #475569; font-family: monospace; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center" href="/livros">
            <i class="bi bi-book-half me-2 fs-4 text-primary"></i>
            <span>BiblioTech</span>
        </a>

        <div class="ms-auto d-flex align-items-center">
            <div class="me-3 text-light d-none d-md-block">
                <small class="text-muted text-uppercase fw-bold" style="font-size: 0.65rem; display: block; line-height: 1;">Usuário Logado</small>
                <span class="fw-semibold text-primary">Área do Usuário</span>
            </div>

            <form th:action="@{/logout}" method="post" class="m-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline-danger btn-sm px-3 fw-bold">
                    <i class="bi bi-box-arrow-right me-1"></i> Sair
                </button>
            </form>
        </div>
    </div>
</nav>

<main class="container">
    <div class="row mb-4 align-items-end">
        <div class="col">
            <h2 class="fw-bold text-dark m-0">Biblioteca Pessoal</h2>
            <p class="text-muted m-0">Gerencie seu acervo e organize suas leituras.</p>
        </div>
        <div class="col-auto">
            <a th:href="@{/livros/novo}" class="btn btn-primary">
                <i class="bi bi-plus-lg me-2"></i> Adicionar Livro
            </a>
        </div>
    </div>

    <div class="card">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th class="ps-4">Título do Livro</th>
                    <th>Autor</th>
                    <th>ISBN</th>
                    <th>Gênero</th>
                    <th class="text-end pe-4">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="livro : ${livros}">
                    <td class="ps-4">
                        <div class="fw-bold text-dark" th:text="${livro.titulo}">Título</div>
                    </td>
                    <td class="text-secondary" th:text="${livro.autor}">Autor</td>
                    <td><span class="badge badge-isbn" th:text="${livro.isbn}">ISBN</span></td>
                    <td><span class="text-muted small" th:text="${livro.genero}">Gênero</span></td>
                    <td class="text-end pe-4">
                        <div class="btn-group shadow-sm">
                            <a th:href="@{/livros/editar/{id}(id=${livro.id})}" class="btn btn-white btn-sm border" title="Editar">
                                <i class="bi bi-pencil-square text-warning"></i>
                            </a>
                            <form th:action="@{/livros/excluir/{id}(id=${livro.id})}" method="post"
                                  style="display:inline" onsubmit="return confirm('Excluir este livro permanentemente?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-white btn-sm border" title="Excluir">
                                    <i class="bi bi-trash3 text-danger"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(livros)}">
                    <td colspan="5" class="text-center py-5 text-muted">
                        <i class="bi bi-archive fs-1 d-block mb-2"></i>
                        Nenhum livro encontrado. Comece adicionando um novo!
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
