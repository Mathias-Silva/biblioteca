<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/bibliotech :: head('Meus Livros | BiblioTech')}"></head>
<body>

<nav th:replace="~{fragments/bibliotech :: navbar}"></nav>

<main class="bt-container">
    <header class="bt-page-header">
        <div>
            <h1 class="bt-page-title">Biblioteca Pessoal</h1>
            <p class="bt-page-subtitle">Gerencie seu acervo e organize suas leituras.</p>
        </div>
        <a th:href="@{/livros/novo}" class="bt-btn-primary">
            <i class="ti ti-plus" aria-hidden="true"></i>
            Adicionar Livro
        </a>
    </header>

    <div class="bt-table-card">
        <table class="bt-table">
            <thead>
            <tr>
                <th>Título do Livro</th>
                <th>Autor</th>
                <th>ISBN</th>
                <th>Gênero</th>
                <th style="text-align: right;">Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="livro : ${livros}">
                <td><span class="bt-table__title" th:text="${livro.titulo}">Título</span></td>
                <td class="bt-table__muted" th:text="${livro.autor}">Autor</td>
                <td><span class="bt-badge-isbn" th:text="${livro.isbn}">ISBN</span></td>
                <td class="bt-table__muted" th:text="${livro.genero}">Gênero</td>
                <td style="text-align: right;">
                    <div class="bt-actions-inline">
                        <a th:href="@{/livros/editar/{id}(id=${livro.id})}"
                           class="bt-icon-btn" title="Editar">
                            <i class="ti ti-pencil" aria-hidden="true"></i>
                        </a>
                        <form th:action="@{/livros/excluir/{id}(id=${livro.id})}" method="post"
                              style="display:inline" onsubmit="return confirm('Excluir este livro permanentemente?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="bt-icon-btn bt-icon-btn--danger" title="Excluir">
                                <i class="ti ti-trash" aria-hidden="true"></i>
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(livros)}">
                <td colspan="5" class="bt-empty-state">
                    Nenhum livro encontrado. Comece adicionando um novo!
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
