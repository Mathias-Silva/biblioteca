<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Editar Livro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .navbar { box-shadow: 0 2px 4px rgba(0,0,0,.08); }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,.04); }
        .btn-primary { background-color: #2563eb; border: none; padding: 8px 20px; border-radius: 8px; }
        .btn-primary:hover { background-color: #1d4ed8; }
        .table thead th { background-color: #f1f5f9; color: #475569; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; }
    </style>
</head>
<body class="container mt-5">

<div class="card mx-auto" style="max-width: 600px;">
    <div class="card-body">
        <h2>Editar Livro</h2>
        <div id="isbn-alerta" class="alert d-none" role="alert"></div>
        <form th:action="@{/livros/editar/{id}(id=${livro.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="mb-3">
                <label>ISBN:</label>
                <div class="input-group">
                    <input type="text" name="isbn" id="isbn" th:value="${livro.isbn}" class="form-control" required>
                    <button type="button" id="btn-buscar-isbn" class="btn btn-outline-primary">
                        <i class="bi bi-search"></i> Buscar
                    </button>
                </div>
            </div>
            <div class="mb-3">
                <label>Título:</label>
                <input type="text" name="titulo" id="titulo" th:value="${livro.titulo}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Autor:</label>
                <input type="text" name="autor" id="autor" th:value="${livro.autor}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Gênero:</label>
                <input type="text" name="genero" id="genero" th:value="${livro.genero}" class="form-control">
            </div>
            <button type="submit" class="btn btn-warning">Salvar Alterações</button>
            <a href="/livros" class="btn btn-link">Cancelar</a>
        </form>
    </div>
</div>

<script>
    const btnBuscarIsbn = document.getElementById('btn-buscar-isbn');
    const alertaIsbn = document.getElementById('isbn-alerta');

    function mostrarAlertaIsbn(mensagem, tipo) {
        alertaIsbn.textContent = mensagem;
        alertaIsbn.className = 'alert alert-' + tipo;
        alertaIsbn.classList.remove('d-none');
    }

    btnBuscarIsbn.addEventListener('click', async () => {
        const isbn = document.getElementById('isbn').value.trim();
        if (!isbn) {
            mostrarAlertaIsbn('Informe o ISBN antes de buscar.', 'warning');
            return;
        }

        btnBuscarIsbn.disabled = true;
        alertaIsbn.classList.add('d-none');

        try {
            const resposta = await fetch('/livros/buscar-isbn?isbn=' + encodeURIComponent(isbn));
            if (!resposta.ok) {
                mostrarAlertaIsbn('Erro no servidor ao buscar o ISBN (código ' + resposta.status + ').', 'danger');
                return;
            }

            const dados = await resposta.json();

            if (dados.mensagem) {
                mostrarAlertaIsbn(dados.mensagem, 'danger');
            } else if (dados.encontrado) {
                document.getElementById('titulo').value = dados.titulo || '';
                document.getElementById('autor').value = dados.autor || '';
                document.getElementById('genero').value = dados.genero || '';
                mostrarAlertaIsbn('Dados do livro preenchidos com sucesso.', 'success');
            } else {
                mostrarAlertaIsbn('Nenhum livro encontrado para este ISBN.', 'warning');
            }
        } catch (e) {
            mostrarAlertaIsbn('Erro ao consultar a API. Tente novamente.', 'danger');
        } finally {
            btnBuscarIsbn.disabled = false;
        }
    });
</script>
</body>
</html>
