# Configuração do Projeto SonarCloud
sonar.projectKey=Mathias-Silva_biblioteca
sonar.organization=mathias-silva
sonar.projectName=biblioteca
sonar.sourceEncoding=UTF-8

# Incluir código Java e templates Thymeleaf na análise
sonar.sources=src/main/java,src/main/resources
sonar.inclusions=**/*.java,**/*.html,**/*.xml

# Excluir arquivos de teste e diretórios de build
sonar.exclusions=**/test/**,**/target/**,**/node_modules/**

# Configurar cobertura de testes (JaCoCo)
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Definir versão Java
sonar.java.source=21

# Ativar análise de segurança para Thymeleaf
sonar.security.enable=true
